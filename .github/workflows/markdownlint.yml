name: Markdown Lint

on:
  push:
    branches:
      - main
      - master
    paths:
      - "**/*.md"
      - ".markdownlint.yml"
      - ".github/workflows/markdownlint.yml"
  pull_request:
    paths:
      - "**/*.md"
      - ".markdownlint.yml"
      - ".github/workflows/markdownlint.yml"

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Lint Markdown
        run: npx --yes markdownlint-cli "**/*.md" --ignore node_modules --ignore _site --ignore vendor